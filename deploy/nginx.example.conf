# MyDate 生产环境 Nginx 示例
# 静态前端 dist + 后端 API（认证/统计/天气）
#
# 部署前在服务器执行：
#   1. npm run build
#   2. 配置 .env.production.local（SMTP、ADMIN_USERNAMES、VITE_QWEATHER_*）
#   3. pm2 start deploy/pm2.ecosystem.example.cjs  或  npm run start:auth
#   4. 将此文件复制到 /etc/nginx/sites-available/mydate 并修改域名与路径

server {
    listen 80;
    server_name your-domain.com;

    root /var/www/my-date/dist;
    index index.html;

    # ── 后端 API：认证 + 注册验证码 + 管理后台统计 ──
    # 必须先在本机 8790 端口运行：npm run start:auth
    location /api/ {
        proxy_pass http://127.0.0.1:8790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA 前端路由（/login /signup /app /admin 等）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 可选：widget 子页面
    location = /widget.html {
        try_files $uri =404;
    }
}

